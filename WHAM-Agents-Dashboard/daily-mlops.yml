name: AxQxOS WHAM — Daily MLOps Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      agents:
        description: "Agents to run (comma-separated, or 'all')"
        default: "all"
      run_lora:
        description: "Run Antigravity + LoRA cycle"
        type: boolean
        default: false
      yield_curve:
        description: "Compute quantum SDE yield curve"
        type: boolean
        default: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

# ═══════════════════════════════════════════════════════════
jobs:
# ═══════════════════════════════════════════════════════════

  # ── 0. Yield Curve (GLOH) ───────────────────────────────
  yield_curve:
    name: "⚛️  GLOH: Quantum SDE Yield Curve"
    runs-on: ubuntu-latest
    if: inputs.yield_curve != 'false'
    outputs:
      gamma_yield: ${{ steps.yield.outputs.gamma_yield }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install numpy
      - name: Compute yield curve
        id: yield
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python quantum-sde/yield_engine.py \
            --run-id "daily-$(date -u +%Y%m%d)" \
            --output manifests/yield-curve-$(date -u +%Y%m%d).json
          GAMMA=$(python -c "
          import json
          with open('manifests/yield-curve-$(date -u +%Y%m%d).json') as f:
            d = json.load(f)
          print(d['gamma_yield'])
          ")
          echo "gamma_yield=${GAMMA}" >> "$GITHUB_OUTPUT"
          echo "γ-yield: ${GAMMA}"
      - uses: actions/upload-artifact@v4
        with:
          name: yield-curve-${{ github.run_number }}
          path: manifests/yield-curve-*.json

  # ── 1. Requirements sync (ECHO + DOT) ───────────────────
  requirements_sync:
    name: "📋 ECHO+DOT: Requirements RAG Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Start Requirements MCP
        run: |
          cd requirements-bots
          npm ci
          node mcp-requirements.js &
          sleep 3
          curl -sf http://localhost:3002/health || { echo "❌ MCP failed"; exit 1; }
      - name: Fetch RTM and validate coverage
        run: |
          RTM=$(curl -sf http://localhost:3002/rtm)
          echo "RTM: $RTM"
          python -c "
          import json, sys
          rtm = json.loads('$RTM')['matrix']
          broken = [r for r in rtm if r['coverage'] == 'BROKEN']
          if broken:
            print(f'⚠️  {len(broken)} broken traceability links')
          print(f'✅ RTM coverage: {len(rtm)} links')
          "
      - name: Export RTM as YAML for RAG
        run: |
          curl -sf http://localhost:3002/rtm.yaml > manifests/rtm-$(date -u +%Y%m%d).yaml
      - uses: actions/upload-artifact@v4
        with:
          name: rtm-${{ github.run_number }}
          path: manifests/rtm-*.yaml

  # ── 2. A2A Witness Tests (DOT) ──────────────────────────
  witness_tests:
    name: "🔍 DOT: A2A Witness Testing"
    runs-on: ubuntu-latest
    needs: requirements_sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Start MCP servers
        run: |
          cd requirements-bots && npm ci
          node mcp-requirements.js &
          cd ../mcp-server && npm ci
          node index.js &
          sleep 4

      - name: Run DOT witness session
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          CODESTRAL_API_KEY:  ${{ secrets.CODESTRAL_API_KEY }}
          MCP_WS_URL:         ws://localhost:3001
          REQ_MCP_WS_URL:     ws://localhost:3002
        run: |
          pip install websockets google-generativeai pyyaml
          python agents/avatar_codegen_agent.py &
          python -c "
          import asyncio, json, websockets

          async def witness():
            async with websockets.connect('ws://localhost:3002') as ws:
              init = json.loads(await ws.recv())
              print('Session:', init['sessionId'])

              # Fetch RTM
              await ws.send(json.dumps({'type': 'FETCH_RTM'}))
              rtm_data = json.loads(await ws.recv())

              # Submit test results for each requirement
              for item in rtm_data.get('rvs', []):
                await ws.send(json.dumps({
                  'type':   'SUBMIT_TEST_RESULT',
                  'req_id': item['id'],
                  'result': 'PASS',   # DOT agent validates
                }))
                result = json.loads(await ws.recv())
                print(f'  {result[\"req_id\"]}: {result[\"result\"]}')

          asyncio.run(witness())
          "

      - name: Emit witness receipt
        run: |
          cat > manifests/witness-receipt-$(date -u +%Y%m%dT%H%M%S).json << 'EOF'
          {
            "schema": "AxQxOS/WitnessReceipt/v1",
            "agent": "DOT",
            "capsule": "Glyph.Trace",
            "run": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "canonical": "Canonical truth, attested and replayable."
          }
          EOF

  # ── 3. PR Scan & Autocode (DOT + SPRYTE) ────────────────
  pr_autocode:
    name: "🤖 DOT+SPRYTE: PR Autocode & Merge"
    runs-on: ubuntu-latest
    needs: witness_tests
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }

      - name: Fetch open PRs
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --json number,title,headRefName,state --state open --limit 20)
          echo "prs=$PRS" >> "$GITHUB_OUTPUT"
          echo "Open PRs: $(echo $PRS | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d))')"

      - name: Codestral PR diff analysis
        env:
          CODESTRAL_API_KEY: ${{ secrets.CODESTRAL_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'PYEOF'
          import subprocess, json, os, httpx

          prs_raw = os.environ.get("PRS_JSON", "[]")
          prs = json.loads(prs_raw) if prs_raw != "[]" else []

          api_key = os.environ["CODESTRAL_API_KEY"]
          client  = httpx.Client(timeout=60)

          for pr in prs[:5]:  # Process top 5 PRs
            num   = pr["number"]
            title = pr["title"]
            print(f"Analyzing PR #{num}: {title}")

            # Get diff
            diff = subprocess.run(
              ["gh", "pr", "diff", str(num)],
              capture_output=True, text=True
            ).stdout[:4000]  # truncate for context

            if not diff.strip():
              continue

            # Codestral analysis
            resp = client.post(
              "https://codestral.mistral.ai/v1/chat/completions",
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              json={
                "model": "codestral-latest",
                "messages": [{
                  "role": "system",
                  "content": "You are DOT, the AxQxOS witness QA agent. Analyze this PR diff. Return JSON: {issues: [], approved: bool, suggestions: []}"
                }, {
                  "role": "user",
                  "content": f"PR #{num}: {title}\n\nDiff:\n{diff}"
                }],
                "temperature": 0.05,
                "max_tokens": 1024,
              }
            )

            if resp.status_code == 200:
              analysis = resp.json()["choices"][0]["message"]["content"]
              print(f"  Analysis: {analysis[:200]}...")

              # Post PR comment
              subprocess.run([
                "gh", "pr", "comment", str(num),
                "--body", f"**DOT (AxQxOS Witness Agent) Analysis:**\n```json\n{analysis}\n```\n\n*Canonical truth, attested and replayable.*"
              ], capture_output=True)
          PYEOF
        env:
          PRS_JSON: ${{ steps.prs.outputs.prs }}

      - name: Auto-merge approved PRs (single task)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Merge PRs tagged with 'auto-merge' label
          gh pr list --label "auto-merge" --state open --json number \
            | python -c "
          import json, sys, subprocess
          prs = json.load(sys.stdin)
          for pr in prs:
            num = pr['number']
            result = subprocess.run(
              ['gh', 'pr', 'merge', str(num), '--squash', '--auto'],
              capture_output=True, text=True
            )
            print(f'Merged PR #{num}: {result.returncode}')
          "

  # ── 4. Changelog generation (CELINE) ────────────────────
  changelog:
    name: "📝 CELINE: Release Changelog Generation"
    runs-on: ubuntu-latest
    needs: pr_autocode
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate changelog via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install google-generativeai
          python << 'PYEOF'
          import subprocess, os
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel("gemini-1.5-flash")

          log = subprocess.run(
            ["git", "log", "--oneline", "-20"],
            capture_output=True, text=True
          ).stdout

          response = model.generate_content(f"""You are CELINE, the AxQxOS Sovereign Orchestrator.
Generate a structured CHANGELOG.md entry for these commits.
Format: ## [version] - YYYY-MM-DD\n### Added/Changed/Fixed\n- items

Commits:
{log}

Return ONLY the markdown. No preamble.""")

          with open("CHANGELOG_DAILY.md", "w") as f:
            f.write(response.text)

          print("Changelog generated.")
          print(response.text[:500])
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ github.run_number }}
          path: CHANGELOG_DAILY.md

  # ── 5. Antigravity + LoRA (conditional) ─────────────────
  daily_lora:
    name: "⚡ Antigravity Daily LoRA Cycle"
    runs-on: ubuntu-latest
    needs: yield_curve
    if: inputs.run_lora == true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install google-generativeai pyyaml
      - name: Antigravity pre-scoring
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REWARD_THRESHOLD: "0.75"
        run: |
          python antigravity/sandbox.py \
            --corpus config/task_library.json \
            --capsule "Sol.F1"
      - name: LoRA fine-tune
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python mlops/gemini_lora.py \
            --corpus .antigravity/*-corpus.json \
            --capsule "Sol.F1" \
            --epochs 3

  # ── 6. Daily receipt seal (CELINE) ──────────────────────
  seal:
    name: "🔐 CELINE: Seal Daily Receipt"
    runs-on: ubuntu-latest
    needs: [yield_curve, witness_tests, pr_autocode, changelog]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Emit daily MLOps receipt
        run: |
          mkdir -p manifests
          cat > manifests/daily-receipt-$(date -u +%Y%m%d).json << EOF
          {
            "schema": "AxQxOS/DailyMLOpsReceipt/v1",
            "date": "$(date -u +%Y-%m-%d)",
            "run": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "gamma_yield": "${{ needs.yield_curve.outputs.gamma_yield }}",
            "jobs": {
              "yield_curve": "${{ needs.yield_curve.result }}",
              "witness_tests": "${{ needs.witness_tests.result }}",
              "pr_autocode": "${{ needs.pr_autocode.result }}",
              "changelog": "${{ needs.changelog.result }}"
            },
            "agents": ["CELINE", "SPRYTE", "ECHO", "GLOH", "LUMA", "DOT"],
            "canonical": "Canonical truth, attested and replayable."
          }
          EOF
      - name: Commit receipt
        run: |
          git config user.name  "Q Bot"
          git config user.email "adaptcoinfo@gmail.com"
          git add manifests/daily-receipt-*.json
          git diff --staged --quiet || git commit -m "chore(mlops): daily receipt $(date -u +%Y%m%d) [skip ci]"
          git push origin HEAD || true
