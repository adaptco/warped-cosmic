###############################################################################
# Digital Brain CI Pipeline
#
# Jobs: lint-and-test → build-image → integration-test → push-image
###############################################################################

name: Digital Brain CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    IMAGE_NAME: digital-brain
    REGISTRY: ghcr.io

jobs:
    # ── Job 1: Lint + Unit Tests ─────────────────────────────────────────
    lint-and-test:
        name: Lint & Unit Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run unit tests
              run: pytest tests/ -v --tb=short

    # ── Job 2: Build Docker Image ────────────────────────────────────────
    build-image:
        name: Build Docker Image
        runs-on: ubuntu-latest
        needs: lint-and-test

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build image
              run: docker build -t ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} .

            - name: Verify image runs
              run: |
                  docker run -d --name brain-test -p 8100:8100 ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
                  sleep 8
                  curl -sf http://localhost:8100/health || (docker logs brain-test && exit 1)
                  docker stop brain-test
                  docker rm brain-test

    # ── Job 3: Integration Test (full stack) ─────────────────────────────
    integration-test:
        name: Stack Integration Test
        runs-on: ubuntu-latest
        needs: build-image

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip

            - name: Install test dependencies
              run: pip install -r requirements.txt

            - name: Start stack
              run: |
                  docker compose up -d --build
                  echo "Waiting for services..."
                  sleep 12

            - name: Health gate
              run: |
                  echo "=== Health Check ==="
                  curl -sf http://localhost:8100/health | python -c "
                  import sys, json
                  data = json.load(sys.stdin)
                  assert data['status'] == 'ok', f'Health check failed: {data}'
                  print(f'OK: {data[\"brain_repos\"]} repos, state={data[\"swarm_state\"]}')
                  "

            - name: E2E API smoke tests
              run: python tests/e2e_api.py

            - name: Teardown
              if: always()
              run: |
                  docker compose down -v
                  echo "Stack torn down."

    # ── Job 4: Push to GHCR (main only) ─────────────────────────────────
    push-image:
        name: Push to GHCR
        runs-on: ubuntu-latest
        needs: integration-test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
