name: AxQxOS Telemetry Daily

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements/base.txt

      - name: Ingest JSONL telemetry
        run: python telemetry/etl.py --root .

      - name: Build KPI snapshot
        run: python telemetry/kpi_report.py

      - name: Upload telemetry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-kpi-${{ github.run_number }}
          path: telemetry/output/
